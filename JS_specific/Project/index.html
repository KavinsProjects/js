<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fetch(data)</title>
</head>
<body>
    <script>

        dictionatydata();

        async function dictionatydata(params) {
            try{
                const response = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/phone");

                if(!response.ok){
                    console.log("could'd fech the data from the api")
                }
                const data = await response.json();
                console.log(data)
            }
            catch(error){
                console.error(error);
            }
        }


    </script>
</body>
</html>
