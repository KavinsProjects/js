<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DefinitionFinder</title>
</head>
<style>
body {
  font-family: sans-serif;
}
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 30px;
  width: 50%;
  height: 500px;
  border: 5px solid rgb(20, 13, 13);
  border-radius: 5px;
  background-color: wheat;
}
.heading {
  font-size: 30px;
}
#inputWord {
  font-size: 30px;
  border-radius: 10px;
  
}
display{
  font-size: 30px;
  border-radius: 10px;
    
}

button {
  padding: 10px;
  font-size: 20px;
  width: 100px;
  cursor: pointer;
}
</style>
  
<body>
<div class="container">
  <h2 class="heading">Word finder</h2>
  <input type="text" id="inputWord" placeholder="Enter the word"><br>
  <button onclick="wordrsMeaining();">Search</button>
  <input type="text" id="display" style="font-size: 24px; width: 90%; padding: 8px;">
</div>
</body>
<script>


async function wordrsMeaining() {
  try {
    const inputdata = document.getElementById("inputWord").value.toUpperCase();
        const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${inputdata}`);
    console.log(response);
    if (!response.ok) {
      console.log("Couldn't fetch the data from the api");
    } else {
      const data = await response.json();
      const worddata = data[0].meanings[0].definitions[0].definition;
      const outputdata = document.getElementById("display");

      outputdata.value = worddata;
  
      outputdata.style.display = "block";
    }
  } catch (error) {
    console.error(error);
  }
}
</script>
</html>
